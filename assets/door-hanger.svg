<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1275 3300" width="1275" height="3300" fill="none">
  <defs>
    <linearGradient id="dhBg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0A192F"/>
      <stop offset="30%" stop-color="#0F2137"/>
      <stop offset="70%" stop-color="#0A192F"/>
      <stop offset="100%" stop-color="#050C17"/>
    </linearGradient>

    <linearGradient id="aquaTeal" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00E5FF"/>
      <stop offset="50%" stop-color="#00D2C4"/>
      <stop offset="100%" stop-color="#0D9488"/>
    </linearGradient>

    <linearGradient id="goldGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F59E0B"/>
      <stop offset="100%" stop-color="#D97706"/>
    </linearGradient>

    <filter id="shadow">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- Door Hanger Canvas Background -->
  <rect width="1275" height="3300" rx="40" fill="url(#dhBg)"/>

  <!-- Die-Cut Door Knob Circle Cutout (Guide + Visual Hole) -->
  <g transform="translate(637.5, 420)">
    <!-- Outer Hole Outline -->
    <circle cx="0" cy="0" r="220" fill="#050C17" stroke="url(#aquaTeal)" stroke-width="8" stroke-dasharray="16 16"/>
    <circle cx="0" cy="0" r="180" fill="#020610"/>
    <!-- Top Cut Slit to Top Edge -->
    <path d="M 0 -180 L 0 -420" stroke="url(#aquaTeal)" stroke-width="8" stroke-dasharray="16 16"/>
  </g>

  <!-- Top Brand Banner -->
  <g transform="translate(150, 720)">
    <!-- Logo Icon -->
    <rect x="0" y="0" width="140" height="140" rx="36" fill="#0A192F" stroke="url(#aquaTeal)" stroke-width="4"/>
    <path d="M44 58 L50 106 C50.5 111 55 115 60 115 L80 115 C85 115 89.5 111 90 106 L96 58 Z" fill="#0A192F" stroke="url(#aquaTeal)" stroke-width="4"/>
    <path d="M34 48 C34 45 36 43 39 43 L101 43 C104 43 106 45 106 48 L106 55 L34 55 Z" fill="url(#aquaTeal)"/>
    <path d="M26 84 C44 68 56 96 74 78 C86 65 100 75 112 66" stroke="#38BDF8" stroke-width="5" stroke-linecap="round" fill="none"/>
    <path d="M98 28 L101 35 L108 38 L101 41 L98 48 L95 41 L88 38 L95 35 Z" fill="#00E5FF"/>

    <!-- Brand Name -->
    <text x="180" y="90" font-family="'Plus Jakarta Sans', sans-serif" font-weight="900" font-size="82" letter-spacing="-2" fill="#FFFFFF">
      FRESH<tspan fill="#00E5FF">ORA</tspan>
    </text>
    <rect x="610" y="36" width="90" height="50" rx="14" fill="#00E5FF"/>
    <text x="655" y="70" font-family="'Plus Jakarta Sans', sans-serif" font-weight="800" font-size="28" fill="#0A192F" text-anchor="middle">SD</text>

    <text x="184" y="135" font-family="'Inter', sans-serif" font-weight="700" font-size="26" letter-spacing="4" fill="#94A3B8">
      SAN DIEGO EAST COUNTY
    </text>
  </g>

  <!-- Big Punchy Main Hook (Social / Edgier Copy) -->
  <g transform="translate(120, 980)">
    <rect width="1035" height="280" rx="32" fill="#00E5FF" fill-opacity="0.08" stroke="#00E5FF" stroke-width="3"/>
    
    <text x="517.5" y="85" font-family="'Plus Jakarta Sans', sans-serif" font-weight="900" font-size="54" fill="#00E5FF" text-anchor="middle">
      TAKE OUT THE TRASH,
    </text>
    <text x="517.5" y="165" font-family="'Plus Jakarta Sans', sans-serif" font-weight="900" font-size="58" fill="#FFFFFF" text-anchor="middle">
      NOT YOUR DIGNITY.
    </text>
    
    <text x="517.5" y="230" font-family="'Inter', sans-serif" font-weight="600" font-size="30" fill="#94A3B8" text-anchor="middle">
      Smell something gross? It’s not your cooking.
    </text>
  </g>

  <!-- Service Pitch & Cadence Banner -->
  <g transform="translate(120, 1310)">
    <rect width="1035" height="190" rx="28" fill="url(#aquaTeal)"/>
    <text x="517.5" y="75" font-family="'Plus Jakarta Sans', sans-serif" font-weight="900" font-size="38" fill="#0A192F" text-anchor="middle">
      HOW FRESHORA WORKS:
    </text>
    <text x="517.5" y="135" font-family="'Inter', sans-serif" font-weight="800" font-size="36" fill="#0A192F" text-anchor="middle">
      "Every month we swing by and clean your bin!"
    </text>
  </g>

  <!-- 3-Step Visual Process -->
  <g transform="translate(120, 1550)">
    <!-- Step 1 -->
    <g transform="translate(0, 0)">
      <rect width="320" height="260" rx="24" fill="#0F2137" stroke="#334155" stroke-width="2"/>
      <circle cx="160" cy="70" r="36" fill="#00E5FF" fill-opacity="0.2"/>
      <text x="160" y="82" font-family="'Plus Jakarta Sans', sans-serif" font-weight="900" font-size="32" fill="#00E5FF" text-anchor="middle">1</text>
      <text x="160" y="145" font-family="'Plus Jakarta Sans', sans-serif" font-weight="800" font-size="24" fill="#FFFFFF" text-anchor="middle">TRASH DAY SYNC</text>
      <text x="160" y="185" font-family="'Inter', sans-serif" font-weight="500" font-size="19" fill="#94A3B8" text-anchor="middle">We arrive right after</text>
      <text x="160" y="215" font-family="'Inter', sans-serif" font-weight="500" font-size="19" fill="#94A3B8" text-anchor="middle">your trash is collected.</text>
    </g>

    <!-- Step 2 -->
    <g transform="translate(357, 0)">
      <rect width="320" height="260" rx="24" fill="#0F2137" stroke="#00E5FF" stroke-width="2"/>
      <circle cx="160" cy="70" r="36" fill="#00E5FF" fill-opacity="0.2"/>
      <text x="160" y="82" font-family="'Plus Jakarta Sans', sans-serif" font-weight="900" font-size="32" fill="#00E5FF" text-anchor="middle">2</text>
      <text x="160" y="145" font-family="'Plus Jakarta Sans', sans-serif" font-weight="800" font-size="24" fill="#FFFFFF" text-anchor="middle">200° HOT WASH</text>
      <text x="160" y="185" font-family="'Inter', sans-serif" font-weight="500" font-size="19" fill="#94A3B8" text-anchor="middle">High-pressure eco blast</text>
      <text x="160" y="215" font-family="'Inter', sans-serif" font-weight="500" font-size="19" fill="#94A3B8" text-anchor="middle">kills 99.9% of bacteria.</text>
    </g>

    <!-- Step 3 -->
    <g transform="translate(715, 0)">
      <rect width="320" height="260" rx="24" fill="#0F2137" stroke="#334155" stroke-width="2"/>
      <circle cx="160" cy="70" r="36" fill="#00E5FF" fill-opacity="0.2"/>
      <text x="160" y="82" font-family="'Plus Jakarta Sans', sans-serif" font-weight="900" font-size="32" fill="#00E5FF" text-anchor="middle">3</text>
      <text x="160" y="145" font-family="'Plus Jakarta Sans', sans-serif" font-weight="800" font-size="24" fill="#FFFFFF" text-anchor="middle">FRESH TO CURB</text>
      <text x="160" y="185" font-family="'Inter', sans-serif" font-weight="500" font-size="19" fill="#94A3B8" text-anchor="middle">Deodorized & clean bin</text>
      <text x="160" y="215" font-family="'Inter', sans-serif" font-weight="500" font-size="19" fill="#94A3B8" text-anchor="middle">returned to your curb.</text>
    </g>
  </g>

  <!-- Pricing Cards (Side by Side) -->
  <g transform="translate(120, 1860)">
    <!-- Monthly Subscription Card (Featured) -->
    <rect width="500" height="420" rx="32" fill="#0A192F" stroke="#00E5FF" stroke-width="4"/>
    <rect x="30" y="30" width="180" height="38" rx="10" fill="#00E5FF"/>
    <text x="120" y="55" font-family="'Inter', sans-serif" font-weight="800" font-size="18" fill="#0A192F" text-anchor="middle">MOST POPULAR</text>

    <text x="30" y="120" font-family="'Plus Jakarta Sans', sans-serif" font-weight="900" font-size="32" fill="#FFFFFF">MONTHLY PLAN</text>
    <text x="30" y="155" font-family="'Inter', sans-serif" font-weight="600" font-size="22" fill="#00E5FF">1 Clean per Month</text>

    <text x="30" y="250" font-family="'Plus Jakarta Sans', sans-serif" font-weight="900" font-size="90" fill="#FFFFFF">$10<tspan font-size="32" font-weight="700" fill="#00E5FF">/bin</tspan></text>
    <text x="30" y="290" font-family="'Inter', sans-serif" font-weight="600" font-size="22" fill="#94A3B8">Monthly recurring auto-clean</text>

    <rect x="30" y="325" width="440" height="60" rx="16" fill="#00E5FF" fill-opacity="0.12"/>
    <text x="250" y="362" font-family="'Inter', sans-serif" font-weight="700" font-size="22" fill="#00E5FF" text-anchor="middle">SAVE 50% vs One-Time Clean</text>

    <!-- One-Time Clean Card -->
    <g transform="translate(535, 0)">
      <rect width="500" height="420" rx="32" fill="#1E293B" fill-opacity="0.5" stroke="#334155" stroke-width="2"/>
      <text x="30" y="120" font-family="'Plus Jakarta Sans', sans-serif" font-weight="900" font-size="32" fill="#E2E8F0">ONE-TIME CLEAN</text>
      <text x="30" y="155" font-family="'Inter', sans-serif" font-weight="600" font-size="22" fill="#94A3B8">Single Deep Sanitize</text>

      <text x="30" y="250" font-family="'Plus Jakarta Sans', sans-serif" font-weight="900" font-size="90" fill="#94A3B8">$20<tspan font-size="32" font-weight="700" fill="#64748B">/bin</tspan></text>
      <text x="30" y="290" font-family="'Inter', sans-serif" font-weight="600" font-size="22" fill="#64748B">Pay as you go</text>

      <rect x="30" y="325" width="440" height="60" rx="16" fill="#334155" fill-opacity="0.4"/>
      <text x="250" y="362" font-family="'Inter', sans-serif" font-weight="600" font-size="20" fill="#94A3B8" text-anchor="middle">No recurring commitment</text>
    </g>
  </g>

  <!-- Large QR Call To Action Box -->
  <g transform="translate(120, 2330)">
    <rect width="1035" height="620" rx="40" fill="#FFFFFF"/>
    
    <text x="517.5" y="70" font-family="'Plus Jakarta Sans', sans-serif" font-weight="900" font-size="52" fill="#0A192F" text-anchor="middle">
      SCAN TO BOOK IN 60 SECONDS
    </text>
    <text x="517.5" y="115" font-family="'Inter', sans-serif" font-weight="700" font-size="28" fill="#0D9488" text-anchor="middle">
      Point your phone camera below to schedule your bins!
    </text>

    <!-- Vector QR Code (Expanded Large Format) -->
    <g transform="translate(367.5, 145)">
      <rect width="300" height="300" fill="#FFFFFF"/>
      <!-- QR Corners -->
      <rect x="10" y="10" width="80" height="80" rx="12" fill="#0A192F"/>
      <rect x="26" y="26" width="48" height="48" rx="6" fill="#FFFFFF"/>
      <rect x="38" y="38" width="24" height="24" rx="4" fill="#00E5FF"/>

      <rect x="210" y="10" width="80" height="80" rx="12" fill="#0A192F"/>
      <rect x="226" y="26" width="48" height="48" rx="6" fill="#FFFFFF"/>
      <rect x="238" y="38" width="24" height="24" rx="4" fill="#00E5FF"/>

      <rect x="10" y="210" width="80" height="80" rx="12" fill="#0A192F"/>
      <rect x="26" y="226" width="48" height="48" rx="6" fill="#FFFFFF"/>
      <rect x="38" y="238" width="24" height="24" rx="4" fill="#00E5FF"/>

      <!-- QR Grid Data -->
      <g fill="#0A192F">
        <rect x="110" y="15" width="20" height="20" rx="4"/>
        <rect x="145" y="15" width="45" height="20" rx="4"/>
        <rect x="105" y="50" width="30" height="30" rx="4"/>
        <rect x="155" y="50" width="35" height="20" rx="4"/>
        <rect x="115" y="90" width="70" height="20" rx="4"/>
        <rect x="15" y="110" width="55" height="20" rx="4"/>
        <rect x="80" y="110" width="25" height="40" rx="4"/>
        <!-- Center Logo Overlay -->
        <rect x="115" y="115" width="70" height="70" rx="16" fill="#00E5FF"/>
        <rect x="125" y="125" width="50" height="50" rx="12" fill="#0A192F"/>
        <path d="M142 140 L145 160 L155 160 L158 140 Z" stroke="#00E5FF" stroke-width="3" fill="none"/>
        <path d="M138 135 L162 135" stroke="#00E5FF" stroke-width="3"/>

        <rect x="200" y="110" width="45" height="20" rx="4"/>
        <rect x="255" y="110" width="30" height="30" rx="4"/>
        <rect x="15" y="145" width="40" height="35" rx="4"/>
        <rect x="65" y="160" width="40" height="20" rx="4"/>
        <rect x="200" y="145" width="50" height="25" rx="4"/>
        <rect x="105" y="200" width="35" height="35" rx="4"/>
        <rect x="150" y="200" width="55" height="20" rx="4"/>
        <rect x="220" y="190" width="30" height="45" rx="4"/>
        <rect x="105" y="245" width="50" height="25" rx="4"/>
        <rect x="165" y="240" width="45" height="45" rx="4"/>
        <rect x="225" y="250" width="50" height="25" rx="4"/>
      </g>
    </g>

    <text x="517.5" y="495" font-family="'Plus Jakarta Sans', sans-serif" font-weight="900" font-size="34" fill="#0A192F" text-anchor="middle">
      FreshoraSD.com
    </text>
    <text x="517.5" y="535" font-family="'Inter', sans-serif" font-weight="700" font-size="26" fill="#0D9488" text-anchor="middle">
      No App Download Required · Instant Mobile Checkout
    </text>
  </g>

  <!-- Footer Info -->
  <g transform="translate(120, 3030)">
    <text x="517.5" y="40" font-family="'Plus Jakarta Sans', sans-serif" font-weight="800" font-size="34" fill="#FFFFFF" text-anchor="middle">
      SERVING SAN DIEGO EAST COUNTY
    </text>
    <text x="517.5" y="90" font-family="'Inter', sans-serif" font-weight="700" font-size="30" fill="#00E5FF" text-anchor="middle">
      El Cajon · La Mesa · Santee
    </text>
    <text x="517.5" y="140" font-family="'Inter', sans-serif" font-weight="600" font-size="26" fill="#94A3B8" text-anchor="middle">
      Questions? Email us: freshorasd@gmail.com
    </text>
  </g>
</svg>
