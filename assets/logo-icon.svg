<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100" fill="none">
  <defs>
    <linearGradient id="primaryNavy" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0A192F"/>
      <stop offset="100%" stop-color="#1E293B"/>
    </linearGradient>
    <linearGradient id="aquaTeal" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00E5FF"/>
      <stop offset="50%" stop-color="#00D2C4"/>
      <stop offset="100%" stop-color="#0D9488"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- Container -->
  <rect width="100" height="100" rx="26" fill="url(#primaryNavy)"/>
  <rect width="98" height="98" x="1" y="1" rx="25" stroke="url(#aquaTeal)" stroke-width="2" stroke-opacity="0.6"/>

  <!-- Bin Icon Base -->
  <path d="M34 42 L38 74 C38.5 77.5 41.5 80 45 80 L55 80 C58.5 80 61.5 77.5 62 74 L66 42 Z" fill="#0A192F" stroke="url(#aquaTeal)" stroke-width="3.5" stroke-linejoin="round"/>
  
  <!-- Bin Lid -->
  <path d="M28 36 C28 34.5 29.5 33 31 33 L69 33 C70.5 33 72 34.5 72 36 L72 40 C72 41 71 42 70 42 L30 42 C29 42 28 41 28 40 Z" fill="url(#aquaTeal)"/>
  <!-- Lid Handle -->
  <path d="M43 30 C43 28.5 44.5 27 46 27 L54 27 C55.5 27 57 28.5 57 30 L57 33 L43 33 Z" fill="url(#aquaTeal)"/>

  <!-- Water Wave -->
  <path d="M22 60 C34 48 42 68 54 54 C62 45 72 52 80 46" stroke="#38BDF8" stroke-width="3.5" stroke-linecap="round" fill="none"/>
  <path d="M18 68 C32 56 40 74 56 60 C64 52 74 58 82 52" stroke="url(#aquaTeal)" stroke-width="2" stroke-linecap="round" fill="none" opacity="0.8"/>

  <!-- Sparkle Stars -->
  <path d="M68 20 L70 25 L75 27 L70 29 L68 34 L66 29 L61 27 L66 25 Z" fill="#00E5FF" filter="url(#glow)"/>
  <circle cx="76" cy="68" r="3" fill="#00E5FF"/>
  <circle cx="28" cy="74" r="2" fill="#38BDF8"/>
</svg>
