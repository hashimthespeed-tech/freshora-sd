    </text>

    <rect x="55" y="745" width="350" height="80" rx="20" fill="#0A192F"/>
    <text x="230" y="795" font-family="'Plus Jakarta Sans', sans-serif" font-weight="800" font-size="26" fill="#FFFFFF" text-anchor="middle">
      BOOK IN 60 SECONDS
    </text>
