    <g transform="translate(55, 190)">
      <rect width="350" height="350" fill="#FFFFFF"/>
      <rect x="10" y="10" width="90" height="90" rx="14" fill="#0A192F"/>
      <rect x="28" y="28" width="54" height="54" rx="8" fill="#FFFFFF"/>
      <rect x="42" y="42" width="26" height="26" rx="4" fill="#00E5FF"/>

      <rect x="250" y="10" width="90" height="90" rx="14" fill="#0A192F"/>
      <rect x="268" y="28" width="54" height="54" rx="8" fill="#FFFFFF"/>
      <rect x="282" y="42" width="26" height="26" rx="4" fill="#00E5FF"/>

      <rect x="10" y="250" width="90" height="90" rx="14" fill="#0A192F"/>
      <rect x="28" y="268" width="54" height="54" rx="8" fill="#FFFFFF"/>
      <rect x="42" y="282" width="26" height="26" rx="4" fill="#00E5FF"/>

      <!-- Data Blocks -->
      <g fill="#0A192F">
        <rect x="125" y="15" width="25" height="25" rx="4"/>
        <rect x="165" y="15" width="55" height="25" rx="4"/>
        <rect x="120" y="55" width="35" height="35" rx="4"/>
        <rect x="180" y="55" width="40" height="25" rx="4"/>
        <rect x="130" y="105" width="80" height="25" rx="4"/>
        <rect x="15" y="125" width="65" height="25" rx="4"/>
        <rect x="95" y="125" width="25" height="45" rx="4"/>
        <!-- Center Logo Overlay -->
        <rect x="135" y="135" width="80" height="80" rx="18" fill="#00E5FF"/>
        <rect x="147" y="147" width="56" height="56" rx="14" fill="#0A192F"/>
        <path d="M166 163 L169 187 L181 187 L184 163 Z" stroke="#00E5FF" stroke-width="3" fill="none"/>
        <path d="M162 157 L188 157" stroke="#00E5FF" stroke-width="3"/>
        <rect x="235" y="125" width="50" height="25" rx="4"/>
        <rect x="295" y="125" width="35" height="35" rx="4"/>
        <rect x="15" y="165" width="45" height="40" rx="4"/>
        <rect x="75" y="185" width="45" height="25" rx="4"/>
        <rect x="235" y="165" width="60" height="30" rx="4"/>
        <rect x="120" y="235" width="40" height="40" rx="4"/>
        <rect x="175" y="235" width="65" height="25" rx="4"/>
        <rect x="255" y="225" width="35" height="50" rx="4"/>
        <rect x="120" y="285" width="60" height="30" rx="4"/>
        <rect x="195" y="280" width="50" height="50" rx="4"/>
        <rect x="260" y="290" width="60" height="30" rx="4"/>
      </g>
