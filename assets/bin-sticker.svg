    </text>
  </g>

  <!-- Right Side: White QR Sticker Callout -->
  <g transform="translate(1220, 160)">
    <rect width="460" height="880" rx="44" fill="#FFFFFF"/>
    
    <text x="230" y="95" font-family="'Plus Jakarta Sans', sans-serif" font-weight="900" font-size="40" fill="#0A192F" text-anchor="middle">
