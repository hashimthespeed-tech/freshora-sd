<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 120" width="520" height="120" fill="none">
  <defs>
    <!-- Gradients -->
    <linearGradient id="primaryNavy" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0A192F"/>
      <stop offset="100%" stop-color="#1E293B"/>
    </linearGradient>
    
    <linearGradient id="aquaTeal" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00E5FF"/>
      <stop offset="50%" stop-color="#00D2C4"/>
      <stop offset="100%" stop-color="#0D9488"/>
    </linearGradient>

    <linearGradient id="waterFlow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#38BDF8"/>
      <stop offset="100%" stop-color="#00E5FF"/>
    </linearGradient>

    <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- Logo Mark Group -->
  <g transform="translate(10, 10)">
    <!-- Outer Shield / Container Glow -->
    <rect x="5" y="5" width="90" height="90" rx="24" fill="url(#primaryNavy)"/>
    <rect x="5" y="5" width="90" height="90" rx="24" stroke="url(#aquaTeal)" stroke-width="2.5" stroke-opacity="0.6"/>

    <!-- Bin Icon Base -->
    <path d="M34 42 L38 74 C38.5 77.5 41.5 80 45 80 L55 80 C58.5 80 61.5 77.5 62 74 L66 42 Z" fill="#0A192F" stroke="url(#aquaTeal)" stroke-width="3.5" stroke-linejoin="round"/>
    
    <!-- Bin Lid -->
    <path d="M28 36 C28 34.5 29.5 33 31 33 L69 33 C70.5 33 72 34.5 72 36 L72 40 C72 41 71 42 70 42 L30 42 C29 42 28 41 28 40 Z" fill="url(#aquaTeal)"/>
    <!-- Lid Handle -->
    <path d="M43 30 C43 28.5 44.5 27 46 27 L54 27 C55.5 27 57 28.5 57 30 L57 33 L43 33 Z" fill="url(#aquaTeal)"/>

    <!-- Water Wave / Fresh Burst passing through -->
    <path d="M24 60 C36 48 44 68 56 54 C64 45 74 52 82 46" stroke="#38BDF8" stroke-width="3.5" stroke-linecap="round" fill="none"/>
    <path d="M20 68 C34 56 42 74 58 60 C66 52 76 58 84 52" stroke="url(#aquaTeal)" stroke-width="2" stroke-linecap="round" fill="none" opacity="0.8"/>

    <!-- Sparkle Stars -->
    <path d="M68 22 L70 27 L75 29 L70 31 L68 36 L66 31 L61 29 L66 27 Z" fill="#00E5FF" filter="url(#softGlow)"/>
    <circle cx="76" cy="68" r="3" fill="#00E5FF"/>
    <circle cx="28" cy="74" r="2" fill="#38BDF8"/>
  </g>

  <!-- Typography -->
  <!-- Main Brand Name -->
  <text x="120" y="68" font-family="'Plus Jakarta Sans', 'Inter', 'Montserrat', sans-serif" font-weight="800" font-size="44" letter-spacing="-1" fill="#0A192F">
    FRESH<tspan fill="url(#aquaTeal)">ORA</tspan>
  </text>
  
  <!-- SD Regional Tag Badge -->
  <rect x="368" y="38" width="46" height="26" rx="6" fill="#0A192F"/>
  <text x="391" y="55" font-family="'Plus Jakarta Sans', 'Inter', sans-serif" font-weight="700" font-size="13" fill="#00E5FF" text-anchor="middle" letter-spacing="1">SD</text>

  <!-- Subtitle Tagline -->
  <text x="122" y="94" font-family="'Inter', sans-serif" font-weight="600" font-size="14" letter-spacing="2" fill="#64748B">
    TRASH DAY, UPGRADED · SAN DIEGO EAST COUNTY
  </text>
</svg>
