<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1050 600" width="1050" height="600" fill="none">
  <defs>
    <linearGradient id="cardBgBack" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0F172A"/>
      <stop offset="100%" stop-color="#0A192F"/>
    </linearGradient>
    <linearGradient id="aquaTeal" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00E5FF"/>
      <stop offset="100%" stop-color="#0D9488"/>
    </linearGradient>
  </defs>

  <rect width="1050" height="600" fill="url(#cardBgBack)"/>
  <rect width="1050" height="12" fill="url(#aquaTeal)"/>

  <!-- Left Side: Pricing Offer & Details -->
  <g transform="translate(80, 80)">
    <!-- Header Badge -->
    <rect width="240" height="36" rx="8" fill="#00E5FF" fill-opacity="0.15" stroke="#00E5FF" stroke-width="1.5"/>
    <text x="120" y="24" font-family="'Inter', sans-serif" font-weight="800" font-size="16" fill="#00E5FF" text-anchor="middle" letter-spacing="1.5">SPECIAL PRICING</text>

    <text x="0" y="90" font-family="'Plus Jakarta Sans', sans-serif" font-weight="800" font-size="44" fill="#FFFFFF">
      Trash Day, Upgraded.
    </text>

    <!-- Price Pill 1 (Subscription) -->
    <g transform="translate(0, 120)">
      <rect width="420" height="110" rx="16" fill="#0A192F" stroke="#00E5FF" stroke-width="2.5"/>
      <text x="24" y="44" font-family="'Plus Jakarta Sans', sans-serif" font-weight="800" font-size="20" fill="#00E5FF">MONTHLY RECURRING PLAN</text>
      <text x="24" y="82" font-family="'Inter', sans-serif" font-weight="600" font-size="16" fill="#94A3B8">Every month we clean your bin</text>
      <text x="396" y="68" font-family="'Plus Jakarta Sans', sans-serif" font-weight="900" font-size="48" fill="#FFFFFF" text-anchor="end">$10<tspan font-size="20" font-weight="600" fill="#00E5FF">/bin</tspan></text>
      <!-- Best Value Tag -->
      <rect x="290" y="-12" width="110" height="24" rx="6" fill="#00E5FF"/>
      <text x="345" y="4" font-family="'Inter', sans-serif" font-weight="800" font-size="12" fill="#0A192F" text-anchor="middle">BEST VALUE</text>
    </g>

    <!-- Price Pill 2 (One-Time) -->
    <g transform="translate(0, 250)">
      <rect width="420" height="85" rx="16" fill="#1E293B" fill-opacity="0.6" stroke="#334155" stroke-width="1.5"/>
      <text x="24" y="38" font-family="'Plus Jakarta Sans', sans-serif" font-weight="700" font-size="18" fill="#E2E8F0">ONE-TIME CLEANING</text>
      <text x="24" y="65" font-family="'Inter', sans-serif" font-weight="500" font-size="15" fill="#64748B">Single deep-sanitize visit</text>
      <text x="396" y="56" font-family="'Plus Jakarta Sans', sans-serif" font-weight="800" font-size="34" fill="#94A3B8" text-anchor="end">$20<tspan font-size="18" font-weight="500">/bin</tspan></text>
    </g>

    <!-- Contact Footer -->
    <text x="0" y="385" font-family="'Inter', sans-serif" font-weight="600" font-size="18" fill="#94A3B8">
      📍 El Cajon · La Mesa · Santee
    </text>
    <text x="0" y="415" font-family="'Inter', sans-serif" font-weight="700" font-size="20" fill="#00E5FF">
      ✉️ freshorasd@gmail.com
    </text>
  </g>

  <!-- Right Side: High Impact QR Code Box -->
  <g transform="translate(620, 80)">
    <rect width="350" height="440" rx="24" fill="#FFFFFF"/>
    
    <text x="175" y="55" font-family="'Plus Jakarta Sans', sans-serif" font-weight="900" font-size="24" fill="#0A192F" text-anchor="middle">
      SCAN TO BOOK
    </text>
    <text x="175" y="80" font-family="'Inter', sans-serif" font-weight="600" font-size="15" fill="#0D9488" text-anchor="middle">
      Book in under 60 seconds
    </text>

    <!-- Simulated Crisp High-Res Vector QR Code -->
    <g transform="translate(45, 105)">
      <!-- QR Background -->
      <rect width="260" height="260" fill="#FFFFFF"/>
      
      <!-- Position Detection Patterns (Top-Left, Top-Right, Bottom-Left) -->
      <rect x="10" y="10" width="70" height="70" rx="8" fill="#0A192F"/>
      <rect x="25" y="25" width="40" height="40" rx="4" fill="#FFFFFF"/>
      <rect x="35" y="35" width="20" height="20" rx="2" fill="#00E5FF"/>

      <rect x="180" y="10" width="70" height="70" rx="8" fill="#0A192F"/>
      <rect x="195" y="25" width="40" height="40" rx="4" fill="#FFFFFF"/>
      <rect x="205" y="35" width="20" height="20" rx="2" fill="#00E5FF"/>

      <rect x="10" y="180" width="70" height="70" rx="8" fill="#0A192F"/>
      <rect x="25" y="195" width="40" height="40" rx="4" fill="#FFFFFF"/>
      <rect x="35" y="205" width="20" height="20" rx="2" fill="#00E5FF"/>

      <!-- QR Data Grid Blocks -->
      <g fill="#0A192F">
        <rect x="100" y="15" width="15" height="15" rx="3"/>
        <rect x="130" y="15" width="30" height="15" rx="3"/>
        <rect x="95" y="45" width="20" height="20" rx="3"/>
        <rect x="140" y="45" width="25" height="15" rx="3"/>
        <rect x="105" y="75" width="50" height="15" rx="3"/>
        <rect x="15" y="95" width="45" height="15" rx="3"/>
        <rect x="70" y="95" width="20" height="30" rx="3"/>
        <rect x="100" y="100" width="60" height="60" rx="12" fill="#00E5FF"/>
        <!-- Logo Center Overlay on QR -->
        <rect x="110" y="110" width="40" height="40" rx="8" fill="#0A192F"/>
        <path d="M124 122 L126 138 L134 138 L136 122 Z" stroke="#00E5FF" stroke-width="2" fill="none"/>
        <path d="M120 118 L140 118" stroke="#00E5FF" stroke-width="2"/>
        <rect x="175" y="95" width="35" height="15" rx="3"/>
        <rect x="220" y="95" width="25" height="25" rx="3"/>
        <rect x="15" y="125" width="30" height="25" rx="3"/>
        <rect x="55" y="135" width="35" height="15" rx="3"/>
        <rect x="175" y="125" width="40" height="20" rx="3"/>
        <rect x="95" y="175" width="25" height="25" rx="3"/>
        <rect x="135" y="175" width="45" height="15" rx="3"/>
        <rect x="190" y="165" width="25" height="35" rx="3"/>
        <rect x="95" y="210" width="40" height="20" rx="3"/>
        <rect x="145" y="205" width="35" height="35" rx="3"/>
        <rect x="195" y="215" width="40" height="20" rx="3"/>
      </g>
    </g>

    <text x="175" y="400" font-family="'Plus Jakarta Sans', sans-serif" font-weight="800" font-size="16" fill="#0A192F" text-anchor="middle">
      FreshoraSD.com
    </text>
    <text x="175" y="420" font-family="'Inter', sans-serif" font-weight="600" font-size="13" fill="#64748B" text-anchor="middle">
      San Diego East County
    </text>
  </g>
</svg>
